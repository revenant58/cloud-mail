name = "cloud-mail"
main = "src/index.js"
compatibility_date = "2025-06-04"
keep_vars = true

[observability]
enabled = true

[[d1_databases]]
binding = "db"
database_name = ""		#isi nama database D1 kamu
database_id = ""		#isi ID database D1 kamu (wrangler d1 create cloud-mail)

[[kv_namespaces]]
binding = "kv"
id = ""					#isi ID KV namespace kamu (wrangler kv namespace create KV)

#[[r2_buckets]]
#binding = "r2"
#bucket_name = ""		#isi nama bucket R2 kamu (opsional)

#[[send_email]]
#name = "email"			#CF发件, 配置后优先使用

[ai]
binding = "ai"

[assets]
binding = "assets"		#静态资源绑定名默认不可修改
directory = "./dist"	#前端vue项目打包的静态资源存放位置,默认dist
not_found_handling = "single-page-application"
run_worker_first = true

[triggers]
crons = ["0 16 * * *"]	#每天晚上12点执行每日任务,刷新分析缓存


[vars]
#ai_model = ""			#ai模型,不填默认使用@cf/meta/llama-3.1-8b-instruct
#analysis_cache = false			#是否开启分析数据缓存
#orm_log = false			#是否sql日志
#domain = []				#邮件域名可可配置多个 示例: ["example1.com","example2.com"]
#admin = ""				#管理员的邮箱	示例: admin@example.com
#jwt_secret = ""			#jwt令牌的密钥 — 推荐使用 secret: wrangler secret put jwt_secret

[build]
command = "pnpm --prefix ../mail-vue install && pnpm --prefix ../mail-vue run build"
